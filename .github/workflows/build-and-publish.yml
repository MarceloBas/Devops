name: build-and-publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build image
      run: |
        docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/project3:latest -f ./docker/Dockerfile .

    - name: Push to Docker Hub
      run: |
        docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/project3:latest

    - name: Get image digest
      run: |
        DIGEST=$(docker inspect docker.io/${{ secrets.DOCKERHUB_USERNAME }}/project3:latest --format='{{index .RepoDigests 0}}')
        echo "DIGEST=$DIGEST" >> $GITHUB_ENV

    - name: Install syft
      run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

    - name: Generate SBOM
      run: syft ${{ env.DIGEST }} -o cyclonedx-json > image-cyclonedx.json

    - name: Install cosign
      run: |
        COSIGN_VERSION=v2.2.3
        curl -sSLf https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64 > cosign
        chmod +x cosign
        sudo mv cosign /usr/local/bin/

    - name: Sign image
      env:
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      run: |
        echo "${{ secrets.COSIGN_KEY }}" > cosign.key
        cosign sign --key cosign.key ${{ env.DIGEST }}

    - name: Verify signature
      run: |
        echo "${{ secrets.COSIGN_PUB }}" > cosign.pub
        cosign verify --key cosign.pub ${{ env.DIGEST }} > cosign-verify.log
        cat cosign-verify.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-artifacts
        path: |
          image-cyclonedx.json
          cosign-verify.log
