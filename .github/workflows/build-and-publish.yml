name: build-and-publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: project3

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build image
      run: |
        docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest -f ./docker/Dockerfile .

    - name: Push to Docker Hub
      run: |
        docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

    - name: Get image digest
      run: |
        DIGEST=$(docker inspect docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest --format='{{index .RepoDigests 0}}')
        echo "DIGEST=$DIGEST" >> $GITHUB_ENV
        echo "Got digest: $DIGEST"

    - name: Install syft
      run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

    - name: Generate SBOM
      run: |
        syft ${{ env.DIGEST }} -o cyclonedx-json > image-cyclonedx.json

    - name: Install cosign v2.2.3
      run: |
        COSIGN_VERSION=v2.2.3
        curl -sSLf https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64 > cosign
        chmod +x cosign
        sudo mv cosign /usr/local/bin/cosign

    - name: Check cosign version
      run: /usr/local/bin/cosign version

    - name: Write cosign key and pub (from base64 secrets)
      run: |
        if [ -z "${{ secrets.COSIGN_KEY_B64 }}" ] || [ -z "${{ secrets.COSIGN_PUB_B64 }}" ]; then
          echo "COSIGN_KEY_B64 or COSIGN_PUB_B64 is missing"; exit 1
        fi
        echo "${{ secrets.COSIGN_KEY_B64 }}" | base64 --decode > cosign.key
        echo "${{ secrets.COSIGN_PUB_B64 }}" | base64 --decode > cosign.pub
        chmod 600 cosign.key
        chmod 644 cosign.pub
        echo "Wrote cosign.key and cosign.pub (decoded from base64)."
        echo "First line of private key:"
        head -n 1 cosign.key

    - name: Sign image
      run: |
        set -e
        if [ -z "${{ env.DIGEST }}" ]; then
          echo "DIGEST is empty"; exit 1
        fi
        /usr/local/bin/cosign sign --key cosign.key "${{ env.DIGEST }}"

    - name: Verify signature
      run: |
        set -e
        /usr/local/bin/cosign verify --key cosign.pub "${{ env.DIGEST }}" > cosign-verify.log || (cat cosign-verify.log && exit 1)
        cat cosign-verify.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-artifacts
        path: |
          image-cyclonedx.json
          cosign-verify.log
