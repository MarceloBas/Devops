name: build-and-publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: project3

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build image
      run: |
        docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest -f ./docker/Dockerfile .

    - name: Push to Docker Hub
      run: |
        docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

    - name: Get image digest
      run: |
        DIGEST=$(docker inspect docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest --format='{{index .RepoDigests 0}}')
        echo "DIGEST=$DIGEST" >> $GITHUB_ENV
        echo "Got digest: $DIGEST"

    - name: Install syft
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin

    - name: Generate SBOM
      run: |
        syft $DIGEST -o cyclonedx-json > image-cyclonedx.json

    - name: Install cosign v2.2.3
      run: |
        COSIGN_VERSION=v2.2.3
        curl -sSLf "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o cosign
        chmod +x cosign
        sudo mv cosign /usr/local/bin/cosign

    - name: Write cosign key and pub (from base64 secrets)
      env:
        COSIGN_KEY_B64: ${{ secrets.COSIGN_KEY_B64 }}
        COSIGN_PUB_B64: ${{ secrets.COSIGN_PUB_B64 }}
      run: |
        echo "$COSIGN_KEY_B64" | base64 --decode > cosign.key
        echo "$COSIGN_PUB_B64" | base64 --decode > cosign.pub
        chmod 600 cosign.key
        chmod 644 cosign.pub
        head -n 1 cosign.pub

    - name: Sign image (CI test, no tlog upload)
      run: |
        /usr/local/bin/cosign sign --key cosign.key --tlog-upload=false "$DIGEST"

    - name: Verify signature
      run: |
        /usr/local/bin/cosign verify --key cosign.pub "$DIGEST" 2>&1 | tee cosign-verify.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-artifacts
        path: |
          image-cyclonedx.json
          cosign-verify.log

